name: Release
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Get version
        id: version
        shell: bash
        run: |
          prefix=$(sed -n 's/.*<VersionPrefix>\([^<]*\)<\/VersionPrefix>.*/\1/p' Directory.Build.props | head -1)
          echo "version=${prefix}.$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build
        run: dotnet build src/Minfilia/Minfilia.csproj -c Release /p:Version=${{ steps.version.outputs.version }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: src/Minfilia/bin/Release/net48/Minfilia.exe
          make_latest: true
